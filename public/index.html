<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Tic Tac Toe AI</h1>
    </header>

    <main>
        <div id="auth-box">
            <h2>Login or Sign Up</h2>
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Password">
            </div>
            <div class="auth-buttons">
                <button onclick="auth('register')">Sign Up</button>
                <button onclick="auth('login')">Login</button>
            </div>
        </div>

        <div id="game-controls" style="display:none">
            <p>Welcome, <span id="display-user"></span>!</p>
            
            <div class="menu-actions">
                <button id="start-btn" onclick="startGame()">Start New Game</button>
                <button onclick="logout()">Logout</button>
            </div>

            <div id="game-area" style="display:none">
                <div id="turn-indicator">Player X's Turn</div>
                <div class="grid">
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
                <button onclick="resetBoard()">Reset Board</button>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
